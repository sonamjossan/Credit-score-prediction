<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="floating-icon icon1">💳</div>
<div class="floating-icon icon2">🏦</div>
<div class="floating-icon icon3">📊</div>
<div class="text-center mb-4">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         width="120"
         class="mb-3">

    <h2>AI Credit Scoring System</h2>
    <p>Secure • Smart • Fast</p>
</div>

<div class="container mt-5">

    <h2 class="text-center">🔐 Login</h2>

    <form method="POST" class="col-md-4 mx-auto mt-4">

        <input class="form-control mb-3" name="username" placeholder="Username">
        <input class="form-control mb-3" type="password" name="password" placeholder="Password">

        <button class="btn btn-primary w-100">Login</button>

        {% if error %}
        <p class="text-danger mt-2 text-center">{{ error }}</p>
        {% endif %}

    </form>

    <p class="text-center mt-3">
        No account? <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
