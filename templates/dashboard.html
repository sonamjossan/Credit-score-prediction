<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<h5 class="text-end">👤 Welcome {{ user }} | <a href="/logout">Logout</a></h5>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand">💳 Credit Dashboard</a>
    <a href="/predict-page" class="btn btn-light">Go Predict</a>
</nav>

<div class="container text-center mt-5">

    <div class="dashboard-card p-5">

        <h1>📊 ML Dashboard</h1>
        <p>Credit Prediction System</p>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>Model</h4>
                    <p>Logistic Regression</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>Dataset</h4>
                    <p>German Credit Data</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-box">
                    <h4>Status</h4>
                    <p>Running</p>
                </div>
            </div>

        </div>

        <a href="/predict-page" class="btn btn-primary mt-4">
            Start Prediction
        </a>

    </div>

</div>

</body>
</html>
